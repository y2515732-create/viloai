kind = "web"
previewPath = "/"
title = "Vilo AI"
version = "1.0.0"
id = "artifacts/vilo-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22983

[services.development]
run = "pnpm --filter @workspace/vilo-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vilo-web", "run", "build" ]
publicDir = "artifacts/vilo-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22983"
BASE_PATH = "/"
