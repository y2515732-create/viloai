services:
  - type: web
    name: viloai
    runtime: node
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/vilo-web run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run migrate
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: viloai-db
          property: connectionString
      # Set this to your Render URL after first deploy, e.g. https://viloai.onrender.com
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_MAIN_NUMBER
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: viloai-db
    databaseName: viloai
    plan: free
